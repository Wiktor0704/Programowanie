    <h1>Zadanie 3</h1>
    <p>Otwórz konsolę (F12), aby zobaczyć wynik.</p>
    
    <script>
        function ciagFibonacciego(n) {
            let fib = [];
            if (n >= 1) fib.push(0);
            if (n >= 2) fib.push(1);
            
            for (let i = 2; i < n; i++) {
                fib.push(fib[i - 1] + fib[i - 2]);
            }
            console.log(fib);
        }

        // Wywołanie funkcji
        ciagFibonacciego(10);
    </script>
