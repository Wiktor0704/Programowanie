<body>
    <h1>Zadanie 6</h1>
    <p>Otwórz konsolę (F12), aby zobaczyć wynik.</p>
    
    <script>
        function rysujChoinke(n) {
            for (let i = 1; i <= n; i++) {
                let spacje = " ".repeat(n - i);
                let gwiazdki = "*".repeat(2 * i - 1);
                console.log(spacje + gwiazdki);
            }
        }

        // Wywołanie funkcji
        rysujChoinke(5);
    </script>
